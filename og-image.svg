<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#11151f"/>
      <stop offset="1" stop-color="#1c2230"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Sieben farbige Akzent-Streifen oben (eine pro Werkzeug) -->
  <rect x="0"    y="0" width="172" height="6" fill="#5e9bff"/>
  <rect x="172"  y="0" width="172" height="6" fill="#2dd4bf"/>
  <rect x="344"  y="0" width="172" height="6" fill="#38bdf8"/>
  <rect x="516"  y="0" width="172" height="6" fill="#a78bfa"/>
  <rect x="688"  y="0" width="172" height="6" fill="#fb7185"/>
  <rect x="860"  y="0" width="172" height="6" fill="#fbbf24"/>
  <rect x="1032" y="0" width="168" height="6" fill="#f472b6"/>

  <!-- Brand-Marke -->
  <g transform="translate(110,170)">
    <rect x="0" y="0" width="120" height="120" rx="22" fill="none" stroke="#5e9bff" stroke-width="6"/>
    <text x="60" y="92" text-anchor="middle" font-family="-apple-system,Segoe UI,Roboto,Arial,sans-serif" font-size="76" font-weight="700" fill="#5e9bff">N</text>
  </g>

  <!-- Titel + Untertitel -->
  <text x="270" y="240" font-family="-apple-system,Segoe UI,Roboto,Arial,sans-serif" font-size="78" font-weight="700" fill="#f4f5f7" letter-spacing="-2">Notenberechner</text>
  <text x="270" y="298" font-family="-apple-system,Segoe UI,Roboto,Arial,sans-serif" font-size="40" font-weight="600" fill="#cbd2dc">für Schulnoten</text>

  <!-- Drei Funktionsfelder -->
  <g font-family="-apple-system,Segoe UI,Roboto,Arial,sans-serif" font-size="26" fill="#b9c0cc">
    <text x="110" y="420">Notenschlüssel · Punkte in Note umrechnen · Klausurstatistik</text>
    <text x="110" y="460">Blocknoten · Zeugnisnoten · Beurteilungen schreiben</text>
  </g>

  <!-- Fußzeile -->
  <text x="110" y="560" font-family="-apple-system,Segoe UI,Roboto,Arial,sans-serif" font-size="28" font-weight="600" fill="#5e9bff">noten.brosemedien.de</text>
  <text x="1090" y="560" text-anchor="end" font-family="-apple-system,Segoe UI,Roboto,Arial,sans-serif" font-size="22" fill="#8b94a3">kostenlos · ohne Anmeldung · im Browser</text>
</svg>
